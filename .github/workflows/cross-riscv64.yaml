name: Cross-compile riscv64

on:
  workflow_dispatch:

jobs:
  cross-riscv64:
    name: Cross-compile zellij for riscv64
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: "riscv64gc-unknown-linux-gnu,wasm32-wasip1"
          cache: false
          rustflags: ""

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        run: |
          echo "Starting cross-compilation at $(date)"
          time cross build --release --target riscv64gc-unknown-linux-gnu
          echo "Finished at $(date)"

      - name: Verify binary
        run: |
          file ./target/riscv64gc-unknown-linux-gnu/release/zellij
          ls -lh ./target/riscv64gc-unknown-linux-gnu/release/zellij
