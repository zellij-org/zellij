name: Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish (example: v1.2.3)"
        required: true
        type: string
      draft:
        description: Create as draft release
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve-release-context:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      draft: ${{ steps.resolve.outputs.draft }}
      default_branch: ${{ steps.resolve.outputs.default_branch }}
    steps:
      - name: Resolve release metadata
        id: resolve
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag_name }}"
            draft="${{ inputs.draft }}"
          else
            release_tag="${GITHUB_REF#refs/tags/}"
            draft="false"
          fi

          release_tag="${release_tag#refs/tags/}"
          if ! git check-ref-format --allow-onelevel "refs/tags/${release_tag}"; then
            echo "Invalid tag name: ${release_tag}"
            exit 1
          fi

          default_branch="${{ vars.RELEASE_DEFAULT_BRANCH }}"
          if [ -z "${default_branch}" ]; then
            default_branch="${{ github.event.repository.default_branch }}"
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Release ${release_tag}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "default_branch=${default_branch}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure release tag exists
        run: git rev-parse --verify "refs/tags/${{ steps.resolve.outputs.release_tag }}^{commit}"

      - name: Ensure release tag commit is on default branch
        run: |
          git fetch --force --tags origin
          git fetch --force origin "${{ steps.resolve.outputs.default_branch }}:refs/remotes/origin/${{ steps.resolve.outputs.default_branch }}"
          tag_commit="$(git rev-parse "refs/tags/${{ steps.resolve.outputs.release_tag }}^{commit}")"
          if ! git merge-base --is-ancestor "${tag_commit}" "origin/${{ steps.resolve.outputs.default_branch }}"; then
            echo "Tag ${{ steps.resolve.outputs.release_tag }} is not on default branch ${{ steps.resolve.outputs.default_branch }}"
            exit 1
          fi

  create-release:
    needs: resolve-release-context
    runs-on: ubuntu-latest
    steps:
      - name: create_release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release-context.outputs.release_tag }}
          name: ${{ needs.resolve-release-context.outputs.release_name }}
          draft: ${{ needs.resolve-release-context.outputs.draft == 'true' }}
          prerelease: false
          generate_release_notes: true

  build-release-normal:
    needs:
      - create-release
      - resolve-release-context
    name: build-release-normal
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        build:
          - linux musl x64
          - linux musl aarch64
          - macos x64
          - macos aarch64
          - windows x64
        include:
          - build: linux musl x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - build: linux musl aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - build: macos x64
            os: macos-latest
            target: x86_64-apple-darwin
          - build: macos aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - build: windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl-tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: "${{ matrix.target }},wasm32-wasip1"
          cache: false
          rustflags: ""

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary (cross-compiled)
        if: matrix.build != 'windows x64'
        run: cargo xtask ci cross ${{ matrix.target }}

      - name: Build release binary (Windows native)
        if: matrix.build == 'windows x64'
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo xtask ci build-release

      - name: Create artifact (Unix)
        if: runner.os != 'Windows'
        id: make-artifact-unix
        run: |
          asset_name="zellij-${{ matrix.target }}.tar.gz"
          tar cvzf "${asset_name}" -C "target/${{ matrix.target }}/release" zellij
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Create artifact (Windows)
        if: runner.os == 'Windows'
        id: make-artifact-windows
        run: |
          $asset_name = "zellij-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/release/zellij.exe" -DestinationPath $asset_name
          echo "asset_name=$asset_name" >> $env:GITHUB_OUTPUT

      - name: Create checksum (Unix)
        if: runner.os != 'Windows'
        id: make-checksum-unix
        run: |
          checksum_name="zellij-${{ matrix.target }}.sha256sum"
          if [[ "$RUNNER_OS" != "macOS" ]]; then
            sha256sum "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          else
            shasum -a 256 "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          fi
          echo "checksum_name=${checksum_name}" >> "$GITHUB_OUTPUT"

      - name: Create checksum (Windows)
        if: runner.os == 'Windows'
        id: make-checksum-windows
        run: |
          $checksum_name = "zellij-${{ matrix.target }}.sha256sum"
          $hash = (Get-FileHash "target/release/zellij.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  target/release/zellij.exe" | Out-File -Encoding ascii $checksum_name
          echo "checksum_name=$checksum_name" >> $env:GITHUB_OUTPUT

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release-context.outputs.release_tag }}
          files: |
            ${{ steps.make-artifact-unix.outputs.asset_name || steps.make-artifact-windows.outputs.asset_name }}
            ${{ steps.make-checksum-unix.outputs.checksum_name || steps.make-checksum-windows.outputs.checksum_name }}
          overwrite_files: true

  build-release-noweb:
    needs:
      - create-release
      - resolve-release-context
    name: build-release-noweb
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        build:
          - linux musl x64
          - linux musl aarch64
          - macos x64
          - macos aarch64
          - windows x64
        include:
          - build: linux musl x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - build: linux musl aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - build: macos x64
            os: macos-latest
            target: x86_64-apple-darwin
          - build: macos aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - build: windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl-tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: "${{ matrix.target }},wasm32-wasip1"
          cache: false
          rustflags: ""

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary (cross-compiled, no-web)
        if: matrix.build != 'windows x64'
        run: cargo xtask ci cross ${{ matrix.target }} --no-web

      - name: Build release binary (Windows native, no-web)
        if: matrix.build == 'windows x64'
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo xtask ci build-release --no-web

      - name: Create artifact (Unix)
        if: runner.os != 'Windows'
        id: make-artifact-unix
        run: |
          asset_name="zellij-no-web-${{ matrix.target }}.tar.gz"
          tar cvzf "${asset_name}" -C "target/${{ matrix.target }}/release" zellij
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Create artifact (Windows)
        if: runner.os == 'Windows'
        id: make-artifact-windows
        run: |
          $asset_name = "zellij-no-web-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/release/zellij.exe" -DestinationPath $asset_name
          echo "asset_name=$asset_name" >> $env:GITHUB_OUTPUT

      - name: Create checksum (Unix)
        if: runner.os != 'Windows'
        id: make-checksum-unix
        run: |
          checksum_name="zellij-no-web-${{ matrix.target }}.sha256sum"
          if [[ "$RUNNER_OS" != "macOS" ]]; then
            sha256sum "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          else
            shasum -a 256 "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          fi
          echo "checksum_name=${checksum_name}" >> "$GITHUB_OUTPUT"

      - name: Create checksum (Windows)
        if: runner.os == 'Windows'
        id: make-checksum-windows
        run: |
          $checksum_name = "zellij-no-web-${{ matrix.target }}.sha256sum"
          $hash = (Get-FileHash "target/release/zellij.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  target/release/zellij.exe" | Out-File -Encoding ascii $checksum_name
          echo "checksum_name=$checksum_name" >> $env:GITHUB_OUTPUT

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release-context.outputs.release_tag }}
          files: |
            ${{ steps.make-artifact-unix.outputs.asset_name || steps.make-artifact-windows.outputs.asset_name }}
            ${{ steps.make-checksum-unix.outputs.checksum_name || steps.make-checksum-windows.outputs.checksum_name }}
          overwrite_files: true
